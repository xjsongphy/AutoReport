agents:
  defaults:
    max_tokens: 8192
    max_tool_iterations: 200
    model: anthropic/claude-sonnet-4.5
    prompt_templates_dir: templates/agents
    provider: auto
    temperature: 0.1
    timezone: Asia/Shanghai
mineru_api:
  enabled: true
  timeout: 300
  validate_on_startup: true
providers:
  configurations:
  - enabled: true
    id: anthropic-default
    name: Anthropic
    provider: anthropic
  - enabled: true
    id: openai-default
    name: OpenAI
    provider: openai
  - enabled: false
    id: google-default
    name: Google Gemini
    provider: google
  - enabled: true
    id: deepseek-default
    name: DeepSeek
    provider: deepseek
  - enabled: false
    id: openrouter-default
    name: OpenRouter
    provider: openrouter
  - enabled: false
    id: groq-default
    name: Groq
    provider: groq
  - enabled: false
    id: custom-default
    name: Custom
    provider: custom
